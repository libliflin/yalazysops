name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: test
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          check-latest: true

      - name: Install sops (action)
        id: sops_action
        continue-on-error: true
        uses: getsops/sops-installer-action@v1
        with:
          version: latest

      - name: Install sops (binary fallback)
        if: steps.sops_action.outcome != 'success'
        shell: bash
        run: |
          set -euo pipefail
          SOPS_VERSION="v3.9.0"
          case "${{ runner.os }}" in
            Linux)
              ARCH="$(uname -m)"
              case "$ARCH" in
                x86_64) ASSET="sops-${SOPS_VERSION}.linux.amd64" ;;
                aarch64|arm64) ASSET="sops-${SOPS_VERSION}.linux.arm64" ;;
                *) echo "unsupported arch: $ARCH" >&2; exit 1 ;;
              esac
              ;;
            macOS)
              ARCH="$(uname -m)"
              case "$ARCH" in
                x86_64) ASSET="sops-${SOPS_VERSION}.darwin.amd64" ;;
                arm64)  ASSET="sops-${SOPS_VERSION}.darwin.arm64" ;;
                *) echo "unsupported arch: $ARCH" >&2; exit 1 ;;
              esac
              ;;
            *)
              echo "unsupported os: ${{ runner.os }}" >&2; exit 1
              ;;
          esac
          curl -fsSL -o /tmp/sops "https://github.com/getsops/sops/releases/download/${SOPS_VERSION}/${ASSET}"
          chmod +x /tmp/sops
          sudo mv /tmp/sops /usr/local/bin/sops
          sops --version

      - name: Verify sops on PATH
        run: sops --version

      - name: Go module cache
        uses: actions/cache@v4
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
            ~/Library/Caches/go-build
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Download modules
        run: go mod download

      - name: Test
        run: go test -race ./...

  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          check-latest: true

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest

  build:
    name: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          check-latest: true

      - name: Build
        run: go build ./...
