name: CI

# All third-party actions are pinned to immutable SHAs with the readable
# version in a trailing comment. Dependabot (.github/dependabot.yml)
# updates both the SHA and the comment together.

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: test
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff  # v5.6.0
        with:
          go-version: "1.22"
          check-latest: true

      # No widely-trusted GitHub Action exists for installing sops, so we
      # download the upstream binary directly from the sops release page.
      # That's a smaller supply-chain surface than depending on a community
      # action wrapper.
      - name: Install sops
        shell: bash
        run: |
          set -euo pipefail
          SOPS_VERSION="v3.12.2"
          case "${{ runner.os }}" in
            Linux)
              ARCH="$(uname -m)"
              case "$ARCH" in
                x86_64) ASSET="sops-${SOPS_VERSION}.linux.amd64" ;;
                aarch64|arm64) ASSET="sops-${SOPS_VERSION}.linux.arm64" ;;
                *) echo "unsupported arch: $ARCH" >&2; exit 1 ;;
              esac
              curl -fsSL -o /tmp/sops "https://github.com/getsops/sops/releases/download/${SOPS_VERSION}/${ASSET}"
              chmod +x /tmp/sops
              sudo mv /tmp/sops /usr/local/bin/sops
              ;;
            macOS)
              ARCH="$(uname -m)"
              case "$ARCH" in
                x86_64) ASSET="sops-${SOPS_VERSION}.darwin.amd64" ;;
                arm64)  ASSET="sops-${SOPS_VERSION}.darwin.arm64" ;;
                *) echo "unsupported arch: $ARCH" >&2; exit 1 ;;
              esac
              curl -fsSL -o /tmp/sops "https://github.com/getsops/sops/releases/download/${SOPS_VERSION}/${ASSET}"
              chmod +x /tmp/sops
              sudo mv /tmp/sops /usr/local/bin/sops
              ;;
            Windows)
              # GitHub-hosted windows-latest runners are amd64. The sops
              # release publishes per-arch .exe files, not a generic .exe.
              ASSET="sops-${SOPS_VERSION}.amd64.exe"
              mkdir -p "$RUNNER_TEMP/bin"
              curl -fsSL -o "$RUNNER_TEMP/bin/sops.exe" "https://github.com/getsops/sops/releases/download/${SOPS_VERSION}/${ASSET}"
              # $GITHUB_PATH only affects subsequent steps, so verify via
              # the explicit path here.
              "$RUNNER_TEMP/bin/sops.exe" --version
              echo "$RUNNER_TEMP/bin" >> "$GITHUB_PATH"
              exit 0
              ;;
          esac
          sops --version

      - name: Go module cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830  # v4.3.0
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
            ~/Library/Caches/go-build
            ~\AppData\Local\go-build
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Download modules
        run: go mod download

      - name: Test
        run: go test -race ./...

  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff  # v5.6.0
        with:
          go-version: "1.22"
          check-latest: true

      - name: golangci-lint
        uses: golangci/golangci-lint-action@8564da7cb3c6866ed1da648ca8f00a258ef0c802  # v6.5.2
        with:
          version: latest

  build:
    name: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff  # v5.6.0
        with:
          go-version: "1.22"
          check-latest: true

      - name: Build
        run: go build ./...
