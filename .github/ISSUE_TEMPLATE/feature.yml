name: Feature request
description: Suggest a new capability or improvement.
title: "feat: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Before filing, please skim the **Anti-features** section of the
        README. Some things (web UI, multi-file orchestration, custom crypto)
        are deliberately out of scope.

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user-facing problem does this solve? Concrete scenarios beat abstract wishes.
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: What would you like yalazysops to do? Sketch the UX if you can.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you thought about, including "do nothing — work around it externally".
    validations:
      required: false
